services:
  # SERVICIO DE POSTGRESQL PARA LA BASE DE DATOS
  db:
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    networks:
      - shared-network
      - default

  # SERVICIO DE REDIS PARA LA GESTIÓN DE TAREAS ASÍNCRONAS Y CACHE
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # SERVICIO DE MINIO PARA LA GESTIÓN DE ARCHIVOS MEDIA
  minio:
    ports:
      - "9000:9000" # Para la API de S3
      - "9001:9001" # Para la Consola Web
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data # Volumen para persistir los archivos
    environment:
      - MINIO_ROOT_USER=minioadmin # Cambia esto por un usuario seguro
      - MINIO_ROOT_PASSWORD=minioadminsecret # Cambia esto por una contraseña segura
      - MINIO_DEFAULT_BUCKETS=media # Crea el bucket 'media' al iniciar

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # SERVICIO DE PRESTART PARA LA INICIALIZACIÓN DE LA BASE DE DATOS Y OTROS AJUSTES ANTES DE INICIAR EL BACKEND
  prestart:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    volumes:
      # Backend app files
      - ./backend/app:/app/app
      # Backend scripts (contains prestart.sh)
      - ./backend/scripts:/app/scripts
      # Root scripts (contains build_docs.sh)
      - ./scripts:/app/root_scripts
      # Backend docs (for sync_docs.py)
      - ./backend/docs:/app/backend_docs
      # Internal docs (for mkdocs build)
      - ./internal_docs:/app/internal_docs
      # Frontend docs (if needed by sync_docs.py)
      - ./frontend/docs:/app/frontend_docs
      # Root docs (if needed by sync_docs.py)
      - ./docs:/app/root_docs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

  # SERVICIO DEL BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/api/v1/utils/health-check/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      # Backend app files
      - ./backend/app:/app/app
      # Backend scripts (contains prestart.sh)
      - ./backend/scripts:/app/scripts
      # Root scripts (contains build_docs.sh)
      - ./scripts:/app/root_scripts
      # Backend docs (for sync_docs.py)
      - ./backend/docs:/app/backend_docs
      # Internal docs (for mkdocs build)
      - ./internal_docs:/app/internal_docs
      # Frontend docs (if needed by sync_docs.py)
      - ./frontend/docs:/app/frontend_docs
      # Root docs (if needed by sync_docs.py)
      - ./docs:/app/root_docs

  # SERVICIO DEL WORKER DE CELERY PARA TAREAS ASÍNCRONAS
  celery_worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    command: bash scripts/start-celery-worker.sh
    volumes:
      - ./backend/app:/app/app
      - ./scripts:/app/scripts
      - ./backend/scripts:/app/scripts
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      - REDIS_HOST=redis
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
    # Health check para verificar que Celery worker está respondiendo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  # SERVICIO DE CELERY BEAT PARA TAREAS PROGRAMADAS
  celery_beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    command: bash scripts/start-celery-beat.sh
    volumes:
      - ./backend/app:/app/app
      - ./scripts:/app/scripts
      - ./backend/scripts:/app/scripts
    depends_on:
      - redis
      - db
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    # Health check para verificar que Celery beat está corriendo
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  app-db-data:
  redis_data:
  minio_data:

networks:
  shared-network:
    external: true
